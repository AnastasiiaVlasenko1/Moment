<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="512" height="512">
  <!-- Full-bleed cream tile (no rounded corners: iOS applies its own squircle mask,
       Android maskable icons need full bleed). Source for all app-icon PNGs. -->
  <rect width="64" height="64" fill="#f7f3ec"/>
  <!-- Five-petal "Bloom" mark, scaled to ~82% so it sits inside the maskable safe zone. -->
  <g transform="translate(32 32) scale(0.82) translate(-32 -32)">
    <path d="M32 31 C 26 26 26 18 32 12 C 38 18 38 26 32 31 Z" fill="#b5798f" transform="rotate(0 32 32)"/>
    <path d="M32 31 C 26 26 26 18 32 12 C 38 18 38 26 32 31 Z" fill="#5f6e38" transform="rotate(72 32 32)"/>
    <path d="M32 31 C 26 26 26 18 32 12 C 38 18 38 26 32 31 Z" fill="#4e8a85" transform="rotate(144 32 32)"/>
    <path d="M32 31 C 26 26 26 18 32 12 C 38 18 38 26 32 31 Z" fill="#e6b45a" transform="rotate(216 32 32)"/>
    <path d="M32 31 C 26 26 26 18 32 12 C 38 18 38 26 32 31 Z" fill="#c2673e" transform="rotate(288 32 32)"/>
    <circle cx="32" cy="32" r="4.6" fill="#f7f3ec"/>
  </g>
</svg>
